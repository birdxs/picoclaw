name: Check Fork Status

on:
  # 北京时间 8:30, 13:30, 20:00 (UTC 0:30, 5:30, 12:00)
  schedule:
    - cron: '30 0,5,12 * * *'
  workflow_dispatch:

jobs:
  check-fork:
    runs-on: ubuntu-latest
    steps:
      - name: Check fork status
        run: |
          BEHIND=$(gh api repos/sipeed/picoclaw/compare/sipeed:main...birdxs:main --jq '.behind_by')
          
          if [ "$BEHIND" -gt 0 ]; then
            echo "Fork is $BEHIND commits behind"
            COMMITS=$(gh api repos/sipeed/picoclaw/compare/sipeed:main...birdxs:main --jq '.commits[:5] | .[] | "[\(.sha[:7])] \(.commit.message | split("\n")[0])"')
            
            curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d "{\"msg_type\": \"text\", \"content\": {\"text\": \"📦 birdxs/picoclaw\n⚠️ 落后上游 $BEHIND 个 commits\n\n📝 新增提交:\n$COMMITS\"}}"
          else
            echo "Fork is up to date"
          fi          
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
